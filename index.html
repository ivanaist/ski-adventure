<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ski Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #87CEEB;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 4px solid #4a90d9;
            border-radius: 12px;
            background: #f0f8ff;
        }
        #startScreen, #crashScreen, #winScreen {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 4px solid #9b59b6;
        }
        #startScreen h1 {
            font-size: 48px;
            color: #9b59b6;
            margin-bottom: 10px;
        }
        #startScreen p, #crashScreen p, #winScreen p {
            font-size: 24px;
            color: #555;
            margin: 10px 0;
        }
        .subtitle {
            font-size: 18px !important;
            color: #888 !important;
        }
        #crashScreen h2, #winScreen h2 {
            font-size: 40px;
            margin-bottom: 10px;
        }
        #crashScreen h2 { color: #e74c3c; }
        #winScreen h2 { color: #27ae60; }
        .key-hint {
            display: inline-block;
            background: #eee;
            border: 2px solid #ccc;
            border-radius: 8px;
            padding: 6px 16px;
            font-size: 20px;
            font-weight: bold;
            margin: 4px;
        }
        #levelDisplay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: bold;
            color: #9b59b6;
            background: rgba(255,255,255,0.85);
            padding: 8px 24px;
            border-radius: 12px;
            border: 3px solid #9b59b6;
        }
    </style>
</head>
<body>
    <div id="levelDisplay">Level 1</div>
    <canvas id="game"></canvas>

    <div id="startScreen">
        <h1>Ski Adventure</h1>
        <p>Help the skier reach the finish line!</p>
        <p>Dodge the rocks and trees!</p>
        <br>
        <p>
            <span class="key-hint">&larr;</span>
            <span class="key-hint">&rarr;</span> Move
        </p>
        <p><span class="key-hint">Space</span> Jump</p>
        <br>
        <p class="subtitle">Press Space to start!</p>
    </div>

    <div id="crashScreen" style="display:none;">
        <h2>Oops! You crashed!</h2>
        <p>Press Space to try again!</p>
    </div>

    <div id="winScreen" style="display:none;">
        <h2>You made it!</h2>
        <p id="winText">Level complete!</p>
        <p>Press Space for next level!</p>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        // Make canvas fill most of the screen
        function resizeCanvas() {
            canvas.width = Math.min(500, window.innerWidth - 40);
            canvas.height = Math.min(700, window.innerHeight - 40);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game state
        let state = 'start'; // start, playing, crashed, won
        let currentLevel = 1;
        const totalLevels = 20;
        let scrollY = 0;
        let levelLength = 3000;

        // Skier
        const skier = {
            x: 0,
            y: 0,
            width: 30,
            height: 40,
            speed: 3,
            jumping: false,
            jumpTimer: 0,
            jumpDuration: 30,
            onRail: false
        };

        // Controls
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') {
                e.preventDefault();
                if (state === 'start') {
                    state = 'playing';
                    document.getElementById('startScreen').style.display = 'none';
                    startLevel(1);
                } else if (state === 'crashed') {
                    state = 'playing';
                    document.getElementById('crashScreen').style.display = 'none';
                    startLevel(currentLevel);
                } else if (state === 'won') {
                    document.getElementById('winScreen').style.display = 'none';
                    if (currentLevel < totalLevels) {
                        currentLevel++;
                        state = 'playing';
                        startLevel(currentLevel);
                    } else {
                        // Beat all levels!
                        currentLevel = 1;
                        state = 'start';
                        document.getElementById('startScreen').style.display = 'flex';
                    }
                } else if (state === 'playing' && !skier.jumping) {
                    skier.jumping = true;
                    skier.jumpTimer = skier.jumpDuration;
                }
            }
        });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        // Touch controls for mobile
        let touchX = null;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            touchX = touch.clientX - rect.left;

            if (state === 'start') {
                state = 'playing';
                document.getElementById('startScreen').style.display = 'none';
                startLevel(1);
            } else if (state === 'crashed') {
                state = 'playing';
                document.getElementById('crashScreen').style.display = 'none';
                startLevel(currentLevel);
            } else if (state === 'won') {
                document.getElementById('winScreen').style.display = 'none';
                if (currentLevel < totalLevels) {
                    currentLevel++;
                    state = 'playing';
                    startLevel(currentLevel);
                }
            } else if (state === 'playing') {
                // Tap to jump
                if (!skier.jumping) {
                    skier.jumping = true;
                    skier.jumpTimer = skier.jumpDuration;
                }
            }
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            touchX = touch.clientX - rect.left;
        });
        canvas.addEventListener('touchend', () => { touchX = null; });

        // Obstacles
        let obstacles = [];

        function generateLevel(level) {
            obstacles = [];
            levelLength = 3000 + level * 500;
            const numObstacles = 8 + level * 4;
            const margin = 40;

            // Seed random based on level so levels are consistent
            let seed = level * 9973;
            function seededRandom() {
                seed = (seed * 16807 + 0) % 2147483647;
                return seed / 2147483647;
            }

            for (let i = 0; i < numObstacles; i++) {
                const y = 300 + (i / numObstacles) * (levelLength - 500);
                const x = margin + seededRandom() * (canvas.width - margin * 2);
                const type = seededRandom() < 0.4 ? 'rock' : (seededRandom() < 0.7 ? 'tree' : 'rail');

                if (type === 'rail') {
                    obstacles.push({
                        type: 'rail',
                        x: x - 30,
                        y: y,
                        width: 80,
                        height: 10
                    });
                } else if (type === 'tree') {
                    obstacles.push({
                        type: 'tree',
                        x: x,
                        y: y,
                        width: 40,
                        height: 50
                    });
                } else {
                    obstacles.push({
                        type: 'rock',
                        x: x,
                        y: y,
                        width: 35,
                        height: 25
                    });
                }
            }
        }

        function startLevel(level) {
            currentLevel = level;
            document.getElementById('levelDisplay').textContent = 'Level ' + level;
            scrollY = 0;
            skier.x = canvas.width / 2 - skier.width / 2;
            skier.y = 100;
            skier.jumping = false;
            skier.jumpTimer = 0;
            skier.onRail = false;
            generateLevel(level);
        }

        // Drawing functions
        function drawSnow() {
            // Snowy background with subtle lines
            ctx.fillStyle = '#f5f9ff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Snow texture lines
            ctx.strokeStyle = '#e8eef5';
            ctx.lineWidth = 1;
            for (let y = -scrollY % 40; y < canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function drawSkier() {
            const x = skier.x;
            let y = skier.y;
            const jumpOffset = skier.jumping ? 10 : 0;

            // Shadow when jumping
            if (skier.jumping) {
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.beginPath();
                ctx.ellipse(x + skier.width / 2, y + skier.height + 5, 18, 6, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            y -= jumpOffset;

            // Body (purple)
            ctx.fillStyle = '#9b59b6';
            ctx.fillRect(x + 8, y + 12, 14, 18);

            // Head
            ctx.fillStyle = '#fdbcb4';
            ctx.beginPath();
            ctx.arc(x + 15, y + 8, 8, 0, Math.PI * 2);
            ctx.fill();

            // Hair (brown)
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.arc(x + 15, y + 5, 8, Math.PI, Math.PI * 2);
            ctx.fill();
            // Long hair
            ctx.fillRect(x + 7, y + 5, 3, 12);
            ctx.fillRect(x + 20, y + 5, 3, 12);

            // Helmet/hat (purple)
            ctx.fillStyle = '#8e44ad';
            ctx.beginPath();
            ctx.arc(x + 15, y + 3, 9, Math.PI, Math.PI * 2);
            ctx.fill();

            // Goggles
            ctx.fillStyle = '#f39c12';
            ctx.fillRect(x + 9, y + 6, 12, 4);
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(x + 10, y + 7, 4, 2);
            ctx.fillRect(x + 16, y + 7, 4, 2);

            // Skis
            ctx.fillStyle = '#ff69b4';
            ctx.fillRect(x + 2, y + 30 + jumpOffset, 10, 12);
            ctx.fillRect(x + 18, y + 30 + jumpOffset, 10, 12);

            // Poles
            ctx.strokeStyle = '#777';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x + 5, y + 15);
            ctx.lineTo(x - 3, y + 35 + jumpOffset);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x + 25, y + 15);
            ctx.lineTo(x + 33, y + 35 + jumpOffset);
            ctx.stroke();
        }

        function drawTree(x, y) {
            // Trunk
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x + 14, y + 30, 12, 20);

            // Layers of green
            ctx.fillStyle = '#27ae60';
            ctx.beginPath();
            ctx.moveTo(x + 20, y);
            ctx.lineTo(x + 42, y + 25);
            ctx.lineTo(x - 2, y + 25);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#2ecc71';
            ctx.beginPath();
            ctx.moveTo(x + 20, y + 10);
            ctx.lineTo(x + 45, y + 35);
            ctx.lineTo(x - 5, y + 35);
            ctx.closePath();
            ctx.fill();

            // Snow on top
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.moveTo(x + 20, y - 2);
            ctx.lineTo(x + 28, y + 10);
            ctx.lineTo(x + 12, y + 10);
            ctx.closePath();
            ctx.fill();
        }

        function drawRock(x, y) {
            ctx.fillStyle = '#7f8c8d';
            ctx.beginPath();
            ctx.ellipse(x + 17, y + 15, 18, 12, 0, 0, Math.PI * 2);
            ctx.fill();

            // Highlight
            ctx.fillStyle = '#95a5a6';
            ctx.beginPath();
            ctx.ellipse(x + 14, y + 12, 10, 7, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // Snow cap
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.ellipse(x + 17, y + 8, 12, 5, 0, Math.PI, Math.PI * 2);
            ctx.fill();
        }

        function drawRail(x, y, width) {
            // Posts
            ctx.fillStyle = '#e67e22';
            ctx.fillRect(x, y - 15, 6, 25);
            ctx.fillRect(x + width - 6, y - 15, 6, 25);

            // Rail bar
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(x, y - 4, width, 8);

            // Shine
            ctx.fillStyle = '#f9e547';
            ctx.fillRect(x + 4, y - 2, width - 8, 3);
        }

        function drawFinishLine(y) {
            const screenY = y - scrollY;
            if (screenY > -20 && screenY < canvas.height + 20) {
                // Checkered pattern
                const squareSize = 20;
                for (let i = 0; i < canvas.width / squareSize; i++) {
                    ctx.fillStyle = (i % 2 === 0) ? '#e74c3c' : 'white';
                    ctx.fillRect(i * squareSize, screenY, squareSize, squareSize);
                    ctx.fillStyle = (i % 2 === 0) ? 'white' : '#e74c3c';
                    ctx.fillRect(i * squareSize, screenY + squareSize, squareSize, squareSize);
                }

                // "FINISH" text
                ctx.fillStyle = '#9b59b6';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('FINISH!', canvas.width / 2, screenY - 10);
                ctx.textAlign = 'left';
            }
        }

        // Collision detection
        function checkCollision(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }

        // Game loop
        function update() {
            if (state !== 'playing') return;

            // Scroll down automatically
            const scrollSpeed = 2 + currentLevel * 0.3;
            scrollY += scrollSpeed;

            // Move skier left/right
            if (keys['ArrowLeft']) {
                skier.x -= skier.speed;
            }
            if (keys['ArrowRight']) {
                skier.x += skier.speed;
            }

            // Touch controls
            if (touchX !== null) {
                const center = skier.x + skier.width / 2;
                if (touchX < center - 20) skier.x -= skier.speed;
                if (touchX > center + 20) skier.x += skier.speed;
            }

            // Keep skier on screen
            if (skier.x < 0) skier.x = 0;
            if (skier.x > canvas.width - skier.width) skier.x = canvas.width - skier.width;

            // Jump timer
            if (skier.jumping) {
                skier.jumpTimer--;
                if (skier.jumpTimer <= 0) {
                    skier.jumping = false;
                    skier.onRail = false;
                }
            }

            // Check collisions with obstacles
            skier.onRail = false;
            for (const obs of obstacles) {
                const screenY = obs.y - scrollY;
                if (screenY < -100 || screenY > canvas.height + 100) continue;

                const obsScreen = { x: obs.x, y: screenY, width: obs.width, height: obs.height };
                const skierBox = { x: skier.x + 5, y: skier.y + 5, width: skier.width - 10, height: skier.height - 10 };

                if (checkCollision(skierBox, obsScreen)) {
                    if (obs.type === 'rail' && skier.jumping) {
                        // Land on rail and slide!
                        skier.onRail = true;
                        skier.jumping = true;
                        skier.jumpTimer = Math.max(skier.jumpTimer, 15);
                    } else if (obs.type === 'rail') {
                        // Rails don't hurt if you're not jumping — you just pass under
                    } else if (obs.type === 'tree') {
                        // Trees are too tall to jump over — always crash!
                        state = 'crashed';
                        document.getElementById('crashScreen').style.display = 'flex';
                        return;
                    } else if (!skier.jumping) {
                        // Hit a rock! Crash!
                        state = 'crashed';
                        document.getElementById('crashScreen').style.display = 'flex';
                        return;
                    }
                }
            }

            // Check finish line
            if (scrollY >= levelLength) {
                state = 'won';
                const winText = document.getElementById('winText');
                if (currentLevel >= totalLevels) {
                    winText.textContent = 'You beat ALL 20 levels! Amazing!';
                } else {
                    winText.textContent = 'Level ' + currentLevel + ' complete!';
                }
                document.getElementById('winScreen').style.display = 'flex';
            }
        }

        function draw() {
            drawSnow();

            // Draw finish line
            drawFinishLine(levelLength);

            // Draw obstacles
            for (const obs of obstacles) {
                const screenY = obs.y - scrollY;
                if (screenY < -60 || screenY > canvas.height + 60) continue;

                if (obs.type === 'tree') {
                    drawTree(obs.x, screenY);
                } else if (obs.type === 'rock') {
                    drawRock(obs.x, screenY);
                } else if (obs.type === 'rail') {
                    drawRail(obs.x, screenY, obs.width);
                }
            }

            // Draw skier
            drawSkier();

            // Progress bar
            const progress = Math.min(scrollY / levelLength, 1);
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fillRect(canvas.width - 25, 10, 15, canvas.height - 20);
            ctx.fillStyle = '#9b59b6';
            ctx.fillRect(canvas.width - 25, 10, 15, (canvas.height - 20) * progress);
            ctx.strokeStyle = '#8e44ad';
            ctx.lineWidth = 2;
            ctx.strokeRect(canvas.width - 25, 10, 15, canvas.height - 20);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
